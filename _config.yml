title: DevOps Bible
description: >-
  The ultimate one-stop resource for DevOps & Platform Engineer interview
  preparation. Covers the most asked topics at FAANG, top MNCs, and
  high-growth startups.

# Served at https://babbarutkarsh.github.io/DevOps-Bible
baseurl: "/DevOps-Bible"
url: "https://babbarutkarsh.github.io"

# Just-the-Docs theme, pulled remotely so no theme gem is vendored in the repo.
# jekyll-remote-theme is a GitHub Pages supported plugin, so the site builds
# natively without a custom Actions workflow.
remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# --- Just-the-Docs options ---
color_scheme: dob

search_enabled: true
search:
  heading_level: 2
  previews: 3
  tokenizer_separator: /[\s/]+/

# Show a "table of contents" style heading anchors
heading_anchors: true

# Footer / repo links
aux_links:
  "DevOps Bible on GitHub":
    - "https://github.com/babbarutkarsh/DevOps-Bible"
aux_links_new_tab: true

back_to_top: true
back_to_top_text: "Back to top"

footer_content: >-
  Contributions welcome. If you find this helpful,
  <a href="https://github.com/babbarutkarsh/DevOps-Bible">give it a star</a>.

# GitHub "edit this page" links
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/babbarutkarsh/DevOps-Bible"
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

# Keep repo/tooling files out of the built site
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .cursor/
  - vendor/
